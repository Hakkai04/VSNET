# Project Structure
project: "runs/train"
name: "vsnet"
model_name: "vsnet" # Change to "unet", "vnet", or "attention_unet" to test others
data_dir: "./dataset"
dataset_json: "dataset_full_thin.json"

# Training Hyperparameters
max_epochs: 2000
val_interval: 5
batch_size: 4
target_batch_size: 16
lr: 0.001
weight_decay: 0.00001
patch_size: [96, 96, 96]
num_samples: 4

# Loss Weights
alpha: 1.0  # Weight for centerline regression (L_cr)
beta: 1.0   # Weight for edge segmentation (L_ec)
gamma: 0.1  # Weight for deep supervision (L_deep)

# Data Normalization
a_min: 0.0
a_max: 200.0
b_min: 0.0
b_max: 1.0
